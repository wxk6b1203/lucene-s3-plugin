syntax = "proto3";

package lucene_s3.http.v1;

option java_multiple_files = true;
option java_package = "com.github.wxk6b1203.http.proto";
option java_outer_classname = "LuceneS3HttpApiProto";

import "google/protobuf/struct.proto";

message SearchRequest {
  Query query = 1;
  repeated Aggregation aggregations = 2;
  VectorQuery vector = 3;
  string routing = 4;
  int32 from = 5;
  int32 size = 6;
  repeated SortField sort = 7;
  repeated google.protobuf.Value search_after = 8;
  string pit_id = 9;
  string read_preference = 10;
}

message Query {
  oneof kind {
    MatchAllQuery match_all = 1;
    IdsQuery ids = 2;
    FieldValueQuery term = 3;
    FieldValuesQuery terms = 4;
    PrefixQuery prefix = 5;
    ExistsQuery exists = 6;
    FieldValueQuery match = 7;
    RangeQuery range = 8;
    BoolQuery bool = 9;
    google.protobuf.Struct raw = 100;
  }
}

message MatchAllQuery {
}

message IdsQuery {
  repeated string values = 1;
}

message FieldValueQuery {
  string field = 1;
  google.protobuf.Value value = 2;
}

message FieldValuesQuery {
  string field = 1;
  repeated google.protobuf.Value values = 2;
}

message PrefixQuery {
  string field = 1;
  string value = 2;
}

message ExistsQuery {
  string field = 1;
}

message RangeQuery {
  string field = 1;
  google.protobuf.Value gt = 2;
  google.protobuf.Value gte = 3;
  google.protobuf.Value lt = 4;
  google.protobuf.Value lte = 5;
  string relation = 6;
}

message BoolQuery {
  repeated Query filter = 1;
  repeated Query must = 2;
  repeated Query should = 3;
  repeated Query must_not = 4;
}

message VectorQuery {
  string field = 1;
  repeated float vector = 2;
  int32 k = 3;
  int32 num_candidates = 4;
  float min_score = 5;
  Query filter = 6;
}

message SortField {
  string field = 1;
  string order = 2;
}

message Aggregation {
  string name = 1;
  oneof kind {
    TermsAggregation terms = 2;
    RangeAggregation range = 3;
    MetricAggregation min = 4;
    MetricAggregation max = 5;
    MetricAggregation sum = 6;
    MetricAggregation avg = 7;
    MetricAggregation value_count = 8;
    google.protobuf.Struct raw = 100;
  }
}

message TermsAggregation {
  string field = 1;
  int32 size = 2;
  int64 min_doc_count = 3;
  google.protobuf.Value missing = 4;
  string order_by = 5;
  string order = 6;
}

message RangeAggregation {
  string field = 1;
  repeated RangeBucket ranges = 2;
}

message RangeBucket {
  string key = 1;
  google.protobuf.Value from = 2;
  google.protobuf.Value to = 3;
}

message MetricAggregation {
  string field = 1;
}

message BulkRequest {
  repeated BulkItem items = 1;
}

message BulkItem {
  BulkAction action = 1;
  string index = 2;
  string id = 3;
  string routing = 4;
  google.protobuf.Struct source = 5;
}

enum BulkAction {
  BULK_ACTION_UNSPECIFIED = 0;
  BULK_ACTION_INDEX = 1;
  BULK_ACTION_CREATE = 2;
  BULK_ACTION_DELETE = 3;
}

message SearchResponse {
  int64 took_millis = 1;
  int32 total_shards = 2;
  int32 successful_shards = 3;
  int32 failed_shards = 4;
  repeated SearchHit hits = 5;
  google.protobuf.Struct aggregations = 6;
  repeated string shard_failures = 7;
}

message SearchHit {
  string index_name = 1;
  string id = 2;
  float score = 3;
  google.protobuf.Struct source = 4;
  repeated google.protobuf.Value sort_values = 5;
}

message BulkResponse {
  int64 took = 1;
  bool errors = 2;
  repeated BulkItemResponse items = 3;
}

message BulkItemResponse {
  BulkAction action = 1;
  string index = 2;
  string id = 3;
  int32 status = 4;
  string result = 5;
  ShardId shard_id = 6;
  Error error = 7;
}

message ShardId {
  string index_name = 1;
  int32 shard_number = 2;
}

message Error {
  string type = 1;
  string reason = 2;
}

message ErrorResponse {
  string error = 1;
  string type = 2;
  int32 status = 3;
}
